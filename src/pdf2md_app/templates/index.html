<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pdf2md</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #8b8d98;
    --accent: #6c63ff;
    --accent-hover: #5a52d5;
    --error: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container {
    width: 100%;
    max-width: 540px;
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: .25rem;
  }
  .subtitle {
    color: var(--muted);
    font-size: .95rem;
    margin-bottom: 2rem;
  }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 1.25rem;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(108, 99, 255, .06);
  }
  .dropzone.has-file {
    border-color: var(--success);
    border-style: solid;
  }
  .dropzone-icon {
    font-size: 2.5rem;
    margin-bottom: .75rem;
  }
  .dropzone-text {
    color: var(--muted);
    font-size: .9rem;
    line-height: 1.5;
  }
  .dropzone-text strong {
    color: var(--accent);
  }
  .file-name {
    color: var(--text);
    font-weight: 500;
    margin-top: .5rem;
    word-break: break-all;
  }
  input[type="file"] { display: none; }

  /* Options row */
  .options {
    display: flex;
    gap: .75rem;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  label {
    font-size: .85rem;
    color: var(--muted);
    white-space: nowrap;
  }
  select {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .55rem .75rem;
    font-size: .9rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* Button */
  .btn {
    width: 100%;
    padding: .75rem;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-primary:disabled {
    opacity: .45;
    cursor: not-allowed;
  }
  .btn-success {
    background: var(--success);
    color: #fff;
    text-decoration: none;
    display: inline-block;
    text-align: center;
    margin-top: .75rem;
  }
  .btn-success:hover { opacity: .9; }

  /* Progress bar */
  .progress-wrap {
    margin-top: 1rem;
    display: none;
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 4px;
    transition: width .4s ease-out;
  }
  .progress-fill.done {
    background: var(--success);
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: .5rem;
    font-size: .85rem;
    color: var(--muted);
  }

  /* System stats */
  .stats-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .75rem 1rem;
    margin-top: 1.5rem;
  }
  .stats-title {
    font-size: .75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: .5rem;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .5rem .75rem;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    gap: .2rem;
  }
  .stat-label {
    font-size: .75rem;
    color: var(--muted);
  }
  .stat-bar-wrap {
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .stat-bar {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease-out, background .3s;
    width: 0%;
  }
  .stat-bar-fill.low { background: var(--success); }
  .stat-bar-fill.mid { background: var(--warn); }
  .stat-bar-fill.high { background: var(--error); }
  .stat-val {
    font-size: .75rem;
    color: var(--text);
    min-width: 3.2em;
    text-align: right;
  }
  .stat-detail {
    font-size: .7rem;
    color: var(--muted);
  }
  .gpu-section {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding-top: .5rem;
    margin-top: .25rem;
  }
  .gpu-name {
    font-size: .75rem;
    color: var(--muted);
    margin-bottom: .4rem;
  }
  .gpu-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: .5rem;
  }

  /* Status */
  .status {
    text-align: center;
    margin-top: 1rem;
    font-size: .9rem;
    min-height: 1.5rem;
  }
  .status.error { color: var(--error); }
  .status.success { color: var(--success); }

  footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: .8rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <h1>pdf2md</h1>
  <p class="subtitle">Convert research PDFs to Markdown or HTML</p>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon" id="dropIcon">&#128196;</div>
    <div class="dropzone-text" id="dropText">
      <strong>Click to upload</strong> or drag &amp; drop<br>PDF files up to 100 MB
    </div>
    <div class="file-name" id="fileName"></div>
    <input type="file" id="fileInput" accept=".pdf,application/pdf">
  </div>

  <div class="options">
    <label for="backend">Backend</label>
    <select id="backend">
      <option value="marker" selected>Marker (recommended)</option>
      <option value="nougat">Nougat (OCR)</option>
      <option value="latexocr">LaTeX-OCR (equations)</option>
      <option value="pymupdf4llm">PyMuPDF4LLM</option>
      <option value="pdftotext">pdftotext (offline)</option>
    </select>
  </div>

  <div class="options">
    <label for="format">Format</label>
    <select id="format">
      <option value="markdown" selected>Markdown (.md)</option>
      <option value="html">HTML (single file, figures embedded)</option>
    </select>
  </div>

  <button class="btn btn-primary" id="convertBtn" disabled>Convert</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-info">
      <span id="progressStage">Starting...</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div id="downloadWrap"></div>

  <!-- System stats -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-title">System Resources</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">CPU</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar"><div class="stat-bar-fill" id="cpuBar"></div></div>
          <span class="stat-val" id="cpuVal">--</span>
        </div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Memory</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar"><div class="stat-bar-fill" id="memBar"></div></div>
          <span class="stat-val" id="memVal">--</span>
        </div>
        <div class="stat-detail" id="memDetail"></div>
      </div>
      <div class="gpu-section" id="gpuSection" style="display:none;">
        <div class="gpu-name" id="gpuName"></div>
        <div class="gpu-stats">
          <div class="stat-item">
            <div class="stat-label">GPU</div>
            <div class="stat-bar-wrap">
              <div class="stat-bar"><div class="stat-bar-fill" id="gpuBar"></div></div>
              <span class="stat-val" id="gpuVal">--</span>
            </div>
          </div>
          <div class="stat-item">
            <div class="stat-label">VRAM</div>
            <div class="stat-bar-wrap">
              <div class="stat-bar"><div class="stat-bar-fill" id="vramBar"></div></div>
              <span class="stat-val" id="vramVal">--</span>
            </div>
            <div class="stat-detail" id="vramDetail"></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Temp</div>
            <div class="stat-bar-wrap">
              <div class="stat-bar"><div class="stat-bar-fill" id="tempBar"></div></div>
              <span class="stat-val" id="tempVal">--</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  Powered by <a href="https://github.com/aTiannnnnn/pdf2md" target="_blank">pdf2md</a>
</footer>

<script>
const dropzone     = document.getElementById("dropzone");
const fileInput    = document.getElementById("fileInput");
const dropIcon     = document.getElementById("dropIcon");
const dropText     = document.getElementById("dropText");
const fileName     = document.getElementById("fileName");
const convertBtn   = document.getElementById("convertBtn");
const statusEl     = document.getElementById("status");
const dlWrap       = document.getElementById("downloadWrap");
const progressWrap = document.getElementById("progressWrap");
const progressFill = document.getElementById("progressFill");
const progressStage= document.getElementById("progressStage");
const progressPct  = document.getElementById("progressPct");

let selectedFile = null;

/* --- Drag & drop --- */
dropzone.addEventListener("click", () => fileInput.click());
["dragenter","dragover"].forEach(e =>
  dropzone.addEventListener(e, ev => { ev.preventDefault(); dropzone.classList.add("dragover"); }));
["dragleave","drop"].forEach(e =>
  dropzone.addEventListener(e, ev => { ev.preventDefault(); dropzone.classList.remove("dragover"); }));
dropzone.addEventListener("drop", ev => {
  const file = ev.dataTransfer.files[0];
  if (file) pickFile(file);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) pickFile(fileInput.files[0]);
});

function pickFile(file) {
  if (!file.name.toLowerCase().endsWith(".pdf")) {
    showStatus("Please select a PDF file.", true);
    return;
  }
  selectedFile = file;
  dropzone.classList.add("has-file");
  dropIcon.textContent = "\u2705";
  dropText.innerHTML = "<strong>File selected</strong>";
  fileName.textContent = file.name;
  convertBtn.disabled = false;
  dlWrap.innerHTML = "";
  statusEl.textContent = "";
  progressWrap.style.display = "none";
}

/* --- Progress --- */
function setProgress(pct, stage) {
  progressFill.style.width = pct + "%";
  progressPct.textContent = Math.round(pct) + "%";
  if (stage) progressStage.textContent = stage;
}

/* --- Convert --- */
convertBtn.addEventListener("click", async () => {
  if (!selectedFile) return;

  convertBtn.disabled = true;
  dlWrap.innerHTML = "";
  statusEl.textContent = "";
  progressWrap.style.display = "block";
  progressFill.className = "progress-fill";
  setProgress(0, "Uploading...");

  const form = new FormData();
  form.append("file", selectedFile);
  form.append("backend", document.getElementById("backend").value);
  form.append("format", document.getElementById("format").value);

  try {
    const res = await fetch("/convert", { method: "POST", body: form });
    const data = await res.json();

    if (!res.ok) {
      setProgress(0, "Failed");
      showStatus(data.error || "Conversion failed.", true);
      convertBtn.disabled = false;
      return;
    }

    setProgress(5, "Conversion started...");
    pollStatus(data.job_id);

  } catch (err) {
    setProgress(0, "Failed");
    showStatus("Network error: " + err.message, true);
    convertBtn.disabled = false;
  }
});

async function pollStatus(jobId) {
  try {
    const res = await fetch("/status/" + jobId);
    const data = await res.json();

    if (data.status === "converting") {
      const pct = Math.max(5, (data.progress || 0) * 100);
      setProgress(pct, data.stage || "Converting...");
      setTimeout(() => pollStatus(jobId), 800);
      return;
    }

    if (data.status === "error") {
      setProgress(0, "Failed");
      showStatus(data.error, true);
      convertBtn.disabled = false;
      return;
    }

    // Done
    setProgress(100, "Done!");
    progressFill.classList.add("done");

    const isZip = data.filename.endsWith(".zip");
    showStatus(
      isZip ? "Conversion complete! (zipped with figures)" : "Conversion complete!",
      false
    );
    statusEl.classList.add("success");

    const a = document.createElement("a");
    a.href = "/download/" + jobId;
    a.className = "btn btn-success";
    a.textContent = "Download " + data.filename;
    dlWrap.appendChild(a);
    convertBtn.disabled = false;

  } catch (err) {
    setProgress(0, "Failed");
    showStatus("Network error: " + err.message, true);
    convertBtn.disabled = false;
  }
}

function showStatus(msg, isError) {
  statusEl.innerHTML = msg;
  statusEl.className = "status" + (isError ? " error" : "");
}

/* --- System stats --- */
function barLevel(pct) {
  if (pct < 50) return "low";
  if (pct < 80) return "mid";
  return "high";
}

function setBar(barEl, valEl, pct, label) {
  barEl.style.width = pct + "%";
  barEl.className = "stat-bar-fill " + barLevel(pct);
  valEl.textContent = label || (pct + "%");
}

async function fetchStats() {
  try {
    const res = await fetch("/system-stats");
    const d = await res.json();

    if (d.cpu_pct != null) setBar(
      document.getElementById("cpuBar"),
      document.getElementById("cpuVal"),
      d.cpu_pct
    );

    if (d.mem_pct != null) {
      setBar(
        document.getElementById("memBar"),
        document.getElementById("memVal"),
        d.mem_pct
      );
      document.getElementById("memDetail").textContent =
        d.mem_used_gb + " / " + d.mem_total_gb + " GB";
    }

    const gpuSec = document.getElementById("gpuSection");
    if (d.gpu) {
      gpuSec.style.display = "";
      document.getElementById("gpuName").textContent = d.gpu.name;

      setBar(
        document.getElementById("gpuBar"),
        document.getElementById("gpuVal"),
        d.gpu.util_pct
      );
      setBar(
        document.getElementById("vramBar"),
        document.getElementById("vramVal"),
        d.gpu.mem_pct
      );
      document.getElementById("vramDetail").textContent =
        Math.round(d.gpu.mem_used_mb) + " / " + Math.round(d.gpu.mem_total_mb) + " MB";

      const tempPct = Math.min(100, d.gpu.temp_c / 90 * 100);
      setBar(
        document.getElementById("tempBar"),
        document.getElementById("tempVal"),
        tempPct,
        d.gpu.temp_c + "\u00B0C"
      );
    } else {
      gpuSec.style.display = "none";
    }
  } catch (e) {}
}

fetchStats();
setInterval(fetchStats, 2000);
</script>
</body>
</html>
